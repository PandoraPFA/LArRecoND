name: "Build Pandora Software Stack"
description: "Checks out all Pandora repositories and builds them in sequence"

runs:
  using: "composite"
  steps:
    - name: Pull Pandora Repositories
      shell: bash
      run: |
        git clone https://github.com/PandoraPFA/PandoraPFA.git /pandora/PandoraPFA
        git clone https://github.com/PandoraPFA/PandoraSDK.git /pandora/PandoraSDK
        git clone https://github.com/PandoraPFA/PandoraMonitoring.git /pandora/PandoraMonitoring
        git clone https://github.com/PandoraPFA/LArContent.git /pandora/LArContent
        cp -r $GITHUB_WORKSPACE /pandora/LArRecoND

    - name: Define Environment
      shell: bash
      run: |
        echo 'source /pandora/root/bin/thisroot.sh' >> /pandora/setup.sh
        echo 'export CMAKE_PREFIX_PATH=/pandora/libtorch:$CMAKE_PREFIX_PATH' >> /pandora/setup.sh

    - name: Build PandoraSDK
      shell: bash
      run: |
        source /pandora/setup.sh
        mkdir -p /pandora/PandoraSDK/build && cd /pandora/PandoraSDK/build
        cmake -DCMAKE_MODULE_PATH=/pandora/PandoraPFA/cmakemodules /pandora/PandoraSDK/
        make -j$(nproc) install

    - name: Build PandoraMonitoring
      shell: bash
      run: |
        source /pandora/setup.sh
        mkdir -p /pandora/PandoraMonitoring/build && cd /pandora/PandoraMonitoring/build
        cmake \
          -DCMAKE_MODULE_PATH=/pandora/PandoraPFA/cmakemodules \
          -DROOT_DIR=/pandora/root/cmake \
          -DPandoraSDK_DIR=/pandora/PandoraSDK \
          /pandora/PandoraMonitoring/
        make -j$(nproc) install

    - name: Build LArContent
      shell: bash
      run: |
        source /pandora/setup.sh
        mkdir -p /pandora/LArContent/build && cd /pandora/LArContent/build
        cmake \
          -DCMAKE_MODULE_PATH=/pandora/PandoraPFA/cmakemodules \
          -DPandoraSDK_DIR=/pandora/PandoraSDK \
          -DEigen3_DIR=/pandora/Eigen3/share/eigen3/cmake \
          -DROOT_DIR=/pandora/root/cmake \
          -DPANDORA_MONITORING=ON \
          -DPandoraMonitoring_DIR=/pandora/PandoraMonitoring \
          -DPANDORA_LIBTORCH=ON \
          -DCMAKE_PREFIX_PATH=/pandora/libtorch/ \
          /pandora/LArContent/
        make -j$(nproc) install

    - name: Build LArRecoND
      shell: bash
      run: |
        source /pandora/setup.sh
        mkdir -p /pandora/LArRecoND/build && cd /pandora/LArRecoND/build
        cmake \
          -DCMAKE_MODULE_PATH=/pandora/PandoraPFA/cmakemodules \
          -DPandoraSDK_DIR=/pandora/PandoraSDK \
          -DEigen3_DIR=/pandora/Eigen3/share/eigen3/cmake \
          -DROOT_DIR=/pandora/root/cmake \
          -DLArContent_DIR=/pandora/LArContent/ \
          -DLArDLContent_DIR=/pandora/LArContent/ \
          -DPANDORA_MONITORING=ON \
          -DPandoraMonitoring_DIR=/pandora/PandoraMonitoring \
          -DPANDORA_LIBTORCH=ON \
          -DCMAKE_PREFIX_PATH=/pandora/libtorch/ \
          /pandora/LArRecoND/
        make -j$(nproc) install
